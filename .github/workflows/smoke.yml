name: Smoke Test

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      PORT: 3000
      NODE_ENV: test
      CORS_ORIGINS: http://localhost:3000
      API_BODY_LIMIT: 10mb
      HASURA_URL: ${{ secrets.HASURA_URL }}
      HASURA_ADMIN_SECRET: ${{ secrets.HASURA_ADMIN_SECRET }}
      NHOST_AUTH_URL: ${{ secrets.NHOST_AUTH_URL }}
      NHOST_STORAGE_URL: ${{ secrets.NHOST_STORAGE_URL }}
      DEFAULT_STORAGE_BUCKET: default
      MAX_UPLOAD_SIZE_MB: 25
      AUTH_RATE_LIMIT_WINDOW_MS: 900000
      AUTH_RATE_LIMIT_MAX: 200
      API_RATE_LIMIT_WINDOW_MS: 900000
      API_RATE_LIMIT_MAX: 2000
      IMPORT_MAX_ROWS: 2000
      IMPORT_ALLOWED_ENTITIES_ADMIN: devices,pops,projects,regions
      IMPORT_ALLOWED_ENTITIES_USER_ALL_REGION: devices,pops,projects
      IMPORT_ALLOWED_ENTITIES_USER_REGION: devices,pops
      BOOTSTRAP_ADMIN_SECRET: ${{ secrets.BOOTSTRAP_ADMIN_SECRET }}
      SMOKE_BASE_URL: http://127.0.0.1:3000
      SMOKE_ADMIN_EMAIL: ${{ secrets.SMOKE_ADMIN_EMAIL }}
      SMOKE_ADMIN_PASSWORD: ${{ secrets.SMOKE_ADMIN_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Validate mandatory secrets
        run: |
          required=(HASURA_URL HASURA_ADMIN_SECRET NHOST_AUTH_URL NHOST_STORAGE_URL SMOKE_ADMIN_EMAIL SMOKE_ADMIN_PASSWORD)
          for key in "${required[@]}"; do
            if [ -z "${!key}" ]; then
              echo "Missing required secret/env: $key"
              exit 1
            fi
          done

      - name: Start backend
        run: |
          npm start > backend.log 2>&1 &
          echo $! > backend.pid
          sleep 5

      - name: Run smoke test
        run: npm run smoke

      - name: Show backend logs on failure
        if: failure()
        run: cat backend.log

      - name: Stop backend
        if: always()
        run: |
          if [ -f backend.pid ]; then
            kill "$(cat backend.pid)" || true
          fi
